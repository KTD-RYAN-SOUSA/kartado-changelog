{% extends "usr_notif.html" %}

{% block content %}

<h2>Olá!</h2>

<p>Os dados da sua conta estão abaixo:</p>

<p>
  <b>Username:</b> {{username}}<br>
  <b>Email:</b> {{email}}<br>
  <b>Senha:</b> {{password}}<br>
</p>

<hr>

<div class="button-container">
  <a href="{{url}}" target="_blank" class="btn btn-primary">LOGIN</a>
</div>

<p>Ou copie esse link no seu navegador para atualizar a senha do usuário:</p>
<p>
  <a href="{{url}}" target="_blank">{{url}}</a>
</p>

{% endblock %}
