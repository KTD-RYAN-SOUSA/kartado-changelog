name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Setup Python
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Checkout release branch
        if: steps.release.outputs.prs_created == 'true'
        uses: actions/checkout@v4
        with:
          ref: release-please--branches--main
          fetch-depth: 0

      - name: Update custom changelog template
        if: steps.release.outputs.prs_created == 'true'
        run: python scripts/generate_custom_changelog.py

      - name: Commit custom changelog update
        if: steps.release.outputs.prs_created == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add changelogs/CHANGELOG.md
          if git diff --cached --quiet; then
            echo "No custom changelog changes"
            exit 0
          fi
          git commit -m "docs: atualizar changelog customizado"
          git push origin HEAD
