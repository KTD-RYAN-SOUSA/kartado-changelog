name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    if: "!startsWith(github.event.pull_request.base.ref, 'env-')"

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Create MCP config
        run: |
          cat > /tmp/mcp-config.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "command": "npx",
                "args": ["-y", "@modelcontextprotocol/server-github"],
                "env": {
                  "GITHUB_PERSONAL_ACCESS_TOKEN": "${{ secrets.GH_PAT_CLAUDE_REVIEW }}"
                }
              }
            }
          }
          EOF

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            PR TITLE: ${{ github.event.pull_request.title }}
            PR AUTHOR: ${{ github.event.pull_request.user.login }}
            BASE BRANCH: ${{ github.event.pull_request.base.ref }}

            ## Contexto
            Você é um tech lead sênior revisando um pull request. Seu objetivo é garantir qualidade de código, segurança e alinhamento com os padrões do projeto antes do merge.

            ## Instruções de execução
            1. Leia o arquivo CLAUDE.md na raiz do repositório para entender convenções e padrões do projeto.
            2. Use `gh pr diff ${{ github.event.pull_request.number }}` para obter o diff completo.
            3. Use `gh pr view ${{ github.event.pull_request.number }}` para entender o contexto e descrição do PR.
            4. Analise o diff com base nos critérios abaixo.
            5. Poste o resultado usando `gh pr comment ${{ github.event.pull_request.number }} --body "<seu review>"`.

            ## Critérios de revisão

            ### Qualidade de código
            - Legibilidade, clareza de nomes e responsabilidade única
            - Duplicação de lógica ou oportunidades de refatoração
            - Complexidade desnecessária

            ### Bugs e comportamentos inesperados
            - Condições de corrida, edge cases não tratados
            - Lógica incorreta ou inversão de condicionais
            - Erros silenciosos (exceções engolidas, retornos implícitos)

            ### Segurança
            - Dados sensíveis expostos (logs, respostas de API, variáveis de ambiente)
            - Inputs não sanitizados ou validação ausente
            - Dependências com vulnerabilidades conhecidas

            ### Performance
            - Queries ou chamadas N+1
            - Processamento síncrono onde assíncrono seria mais adequado
            - Uso inadequado de cache ou memória

            ### Cobertura de testes
            - Casos críticos sem cobertura
            - Testes frágeis ou com mocks excessivos
            - Ausência de testes para lógica nova introduzida

            ### Alinhamento com o projeto
            - Convenções de nomenclatura e estrutura de pastas
            - Padrões de arquitetura definidos no CLAUDE.md
            - Consistência com código existente no repositório

            ## Formato do review

            Organize o comentário da seguinte forma:

            **Resumo geral**
            <Uma ou duas frases sobre o objetivo do PR e impressão geral>

            **Pontos de atenção**
            Liste os problemas encontrados, do mais crítico ao menos crítico. Para cada item, indique:
            - Arquivo e linha (quando possível)
            - Descrição do problema
            - Sugestão de melhoria

            **Sugestões de melhoria** (opcional)
            Melhorias não críticas que agregam valor mas não bloqueiam o merge.

            **Conclusão**
            Indique claramente: Aprovado | Aprovado com ressalvas | Mudanças necessárias

            ## Restrições
            - Escreva todo o review em português brasileiro, com atenção à gramática e ortografia
            - Seja direto e construtivo — aponte o problema e sugira a solução
            - Não use emojis
            - Não seja genérico: todo comentário deve referenciar código real do PR
            - Se o PR for trivial e sem problemas, um review curto e objetivo é suficiente

          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          claude_args: '--mcp-config /tmp/mcp-config.json --allowed-tools "mcp__github__get_file_contents,mcp__github__search_code,Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*)"'

