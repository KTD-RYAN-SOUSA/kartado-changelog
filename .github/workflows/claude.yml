name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read
            

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          prompt: |
            REPO: ${{ github.repository }}
            COMMIT SHA: ${{ github.sha }}
            COMMIT MESSAGE: ${{ github.event.head_commit.message }}
            AUTHOR: ${{ github.event.head_commit.author.name }}
            BRANCH: ${{ github.ref_name }}

            ## Instruções de execução
            1. Use `git diff ${{ github.event.before }} ${{ github.sha }}` para obter as mudanças do commit.
            2. Analise o diff com base nos critérios abaixo.
            3. Se encontrar problemas relevantes, poste um comentário no commit usando:
                `gh api repos/${{ github.repository }}/commits/${{ github.sha }}/comments -f body="<seu review>"`
            4. Se o commit for trivial (ajuste de typo, bump de versão, etc.), não comente.

            ## Critérios de análise
            - Bugs óbvios ou lógica incorreta
            - Dados sensíveis expostos (tokens, senhas, chaves)
            - Código morto ou console.log/print de debug esquecido
            - Inconsistência clara com o padrão do restante do arquivo

            ## Formato do comentário
            Seja breve. Use o formato:

            **Commit:** `${{ github.sha }}`

            <Lista dos problemas encontrados com arquivo, linha e sugestão objetiva>

            ## Restrições
            - Português brasileiro
            - Sem emojis
            - Só comente se houver algo relevante — silence is golden
            - Máximo de 10 linhas no comentário

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'

