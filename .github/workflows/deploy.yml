name: Deploy

on:
  push:
    branches:
      - env-staging-general
      - env-production-general
      - env-production-engie
      - env-production-ccr
      - env-production-eco
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Simular deploy sem executar de fato'
        type: boolean
        default: true

concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

env:
  CI_IMAGE: marcosh72/python-gdal-xmlsec:3.11-v2

# NOTE: All steps run commands inside the CI Docker image (marcosh72/python-gdal-xmlsec)
# via `docker run` instead of using GitHub Actions' native `container:` directive or
# installing dependencies directly on the runner. This is due to incompatibilities between
# the GitHub Actions runner (Ubuntu + Node.js 20) and the Amazon Linux 2-based CI image
# (glibc version mismatch causes Node.js segfaults when using `container:`). Running via
# `docker run` avoids these issues while keeping the same base image used in production.

jobs:
  qa:
    name: Quality Assurance
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Pull CI image
        run: docker pull $CI_IMAGE

      - name: Install dependencies and lint
        run: |
          docker run --rm --entrypoint "" \
            -v "${{ github.workspace }}:/app" -w /app \
            $CI_IMAGE bash -c '
              pip install --upgrade pip &&
              pip install poetry==1.3.1 &&
              poetry config virtualenvs.in-project true &&
              poetry env use 3.11 &&
              poetry install --no-root --extras "ci-tools" &&
              poetry run flake8 . --config .flake8 &&
              poetry run black --check . --config pyproject.toml &&
              poetry run isort . --check-only --settings-file pyproject.toml
            '

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgis/postgis
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Pull CI image
        run: docker pull $CI_IMAGE

      - name: Install dependencies and run tests
        run: |
          docker run --rm --entrypoint "" \
            --network host \
            -v "${{ github.workspace }}:/app" -w /app \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USER=postgres \
            -e DB_PASSWORD=postgres \
            $CI_IMAGE bash -c '
              pip install --upgrade pip &&
              pip install poetry==1.3.1 &&
              poetry config virtualenvs.in-project true &&
              poetry env use 3.11 &&
              poetry install --extras "ci-tools" &&
              poetry run pytest --ds=RoadLabsAPI.settings.testing
            '

  config:
    name: Set deployment config
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set.outputs.environment }}
      zappa_env_override: ${{ steps.set.outputs.zappa_env_override }}
    steps:
      - id: set
        run: |
          case "${{ github.ref_name }}" in
            env-staging-general)    echo "environment=Staging General" >> $GITHUB_OUTPUT ;;
            env-production-general) echo "environment=Production General" >> $GITHUB_OUTPUT ;;
            env-production-engie)   echo "environment=Production ENGIE" >> $GITHUB_OUTPUT ;;
            env-production-ccr)     echo "environment=Production CCR" >> $GITHUB_OUTPUT ;;
            env-production-eco)     echo "environment=Production Eco" >> $GITHUB_OUTPUT ;;
          esac

  deploy:
    name: Build, Migrate & Deploy
    needs: [qa, test, config]
    runs-on: ubuntu-large-4x
    timeout-minutes: 60
    environment: ${{ needs.config.outputs.environment }}
    steps:
      - uses: actions/checkout@v4

      # ==========================================================
      # SETUP
      # ==========================================================
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull CI image
        run: docker pull $CI_IMAGE

      - name: Set common environment variables
        env:
          ZAPPA_ENVIRONMENT_NAME: ${{ needs.config.outputs.zappa_env_override || vars.ZAPPA_ENVIRONMENT_NAME }}
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          COMMIT_HASH="${{ github.sha }}"
          COMMIT_HASH="${COMMIT_HASH:0:7}"

          echo "AWS_ACCOUNT_ID=${AWS_ACCOUNT_ID}" >> $GITHUB_ENV
          echo "COMMIT_HASH=${COMMIT_HASH}" >> $GITHUB_ENV
          echo "ZAPPA_ENVIRONMENT_NAME=${ZAPPA_ENVIRONMENT_NAME}" >> $GITHUB_ENV

          # ECR repos
          ECR_REPOSITORY="${{ vars.ECR_REPOSITORY || 'kartado-backend-zappa' }}"
          echo "ECR_REPOSITORY=${ECR_REPOSITORY}" >> $GITHUB_ENV

          # Zappa image tags
          ECR_BASE="${AWS_ACCOUNT_ID}.dkr.ecr.${{ vars.AWS_DEFAULT_REGION }}.amazonaws.com"
          echo "ZAPPA_TAG_COMMIT=${ECR_BASE}/${ECR_REPOSITORY}:${ZAPPA_ENVIRONMENT_NAME}-${COMMIT_HASH}" >> $GITHUB_ENV
          echo "ZAPPA_TAG_LATEST=${ECR_BASE}/${ECR_REPOSITORY}:${ZAPPA_ENVIRONMENT_NAME}-latest" >> $GITHUB_ENV

          # Regular Docker image
          echo "REGULAR_IMAGE=${ECR_BASE}/kartado_backend/${ZAPPA_ENVIRONMENT_NAME}:latest" >> $GITHUB_ENV

          # ECS Fargate image
          ECS_ECR_REPOSITORY="${ZAPPA_ENVIRONMENT_NAME}-ecs-repository"
          BUILD_TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          ECS_IMAGE_TAG="${COMMIT_HASH}-${BUILD_TIMESTAMP}"
          echo "ECS_ECR_REPOSITORY=${ECS_ECR_REPOSITORY}" >> $GITHUB_ENV
          echo "ECS_IMAGE_TAG=${ECS_IMAGE_TAG}" >> $GITHUB_ENV
          echo "ECS_IMAGE_URI=${ECR_BASE}/${ECS_ECR_REPOSITORY}:${ECS_IMAGE_TAG}" >> $GITHUB_ENV
          echo "ECR_BASE=${ECR_BASE}" >> $GITHUB_ENV

      # ==========================================================
      # STEP 1: Build Zappa Docker image and push to ECR
      # ==========================================================
      - name: Build Zappa Docker image
        run: |
          echo "Building Zappa Docker image"
          echo "  Environment => $ZAPPA_ENVIRONMENT_NAME"
          echo "  Commit Hash => $COMMIT_HASH"
          docker build -f Dockerfile.zappa -t "$ECR_REPOSITORY:temp" .
          docker tag "$ECR_REPOSITORY:temp" "$ZAPPA_TAG_COMMIT"
          docker tag "$ECR_REPOSITORY:temp" "$ZAPPA_TAG_LATEST"

      - name: Push Zappa Docker image to ECR
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "DRY-RUN: Zappa image built and tagged"
            echo "  Commit tag: $ZAPPA_TAG_COMMIT"
            echo "  Latest tag: $ZAPPA_TAG_LATEST"
            echo "  Skipping push to ECR"
          else
            echo "Pushing Zappa images to ECR..."
            docker push "$ZAPPA_TAG_COMMIT"
            docker push "$ZAPPA_TAG_LATEST"
            echo "Successfully pushed:"
            echo "  - $ZAPPA_TAG_COMMIT"
            echo "  - $ZAPPA_TAG_LATEST"
          fi

      # ==========================================================
      # STEP 2+3: Migrate and deploy with Zappa (inside CI image)
      # ==========================================================
      - name: Run migrations and deploy with Zappa
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "DRY-RUN: Simulando migration e deploy Zappa"
            echo "  Stage: $ZAPPA_ENVIRONMENT_NAME"
            echo "  Image URI: $ZAPPA_TAG_LATEST"
          else
            docker run --rm --entrypoint "" \
              --network host \
              -v "${{ github.workspace }}:/app" -w /app \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_DEFAULT_REGION="${{ vars.AWS_DEFAULT_REGION }}" \
              -e STAGE="${{ vars.STAGE }}" \
              -e DB_NAME="${{ vars.DB_NAME }}" \
              -e DB_USER="${{ vars.DB_USER }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e ZAPPA_ENV="$ZAPPA_ENVIRONMENT_NAME" \
              -e ZAPPA_IMAGE="$ZAPPA_TAG_LATEST" \
              -e SSM_TARGET="${{ vars.AWS_SSM_BASTION_INSTANCE }}" \
              -e REAL_DB_HOST="${{ vars.DB_HOST }}" \
              -e REAL_DB_PORT="${{ vars.DB_PORT }}" \
              $CI_IMAGE bash -c '
                set -ex

                echo "=== [1/7] Installing pip + poetry ==="
                pip install --upgrade pip
                pip install poetry==1.3.1

                echo "=== [2/7] Exporting requirements ==="
                poetry export -f requirements.txt --without-hashes --output /tmp/reqs.txt
                echo "Generated $(wc -l < /tmp/reqs.txt) lines in /tmp/reqs.txt"
                head -20 /tmp/reqs.txt

                echo "=== [3/7] Installing dependencies with pip ==="
                pip install -r /tmp/reqs.txt

                echo "=== [4/7] Verifying key packages ==="
                python -c "import decouple; print(\"decouple OK\")"
                python -c "import zappa; print(\"zappa OK\")"

                echo "=== [5/7] Setting up AWS credentials ==="
                mkdir -p ~/.aws
                echo "[default]" > ~/.aws/config
                echo "region = $AWS_DEFAULT_REGION" >> ~/.aws/config
                echo "[default]" > ~/.aws/credentials
                echo "aws_access_key_id = $AWS_ACCESS_KEY_ID" >> ~/.aws/credentials
                echo "aws_secret_access_key = $AWS_SECRET_ACCESS_KEY" >> ~/.aws/credentials

                echo "=== [6/7] Running migrations ==="
                PARAMS="{\"host\":[\"$REAL_DB_HOST\"],\"portNumber\":[\"$REAL_DB_PORT\"],\"localPortNumber\":[\"5555\"]}"
                aws ssm start-session \
                  --region "$AWS_DEFAULT_REGION" \
                  --target "$SSM_TARGET" \
                  --document-name AWS-StartPortForwardingSessionToRemoteHost \
                  --parameters "$PARAMS" &
                SSM_PID=$!
                echo "SSM port forwarding started (PID: $SSM_PID)"
                sleep 10

                export DB_PORT=5555
                export DB_HOST=127.0.0.1
                python manage.py migrate

                kill $SSM_PID 2>/dev/null || true

                echo "=== [7/7] Deploying with Zappa ==="
                zappa update "$ZAPPA_ENV" --docker-image-uri "$ZAPPA_IMAGE"
              '
          fi

      # ==========================================================
      # STEP 4: Build and push regular Docker image (Notebooks)
      # ==========================================================
      # - name: Build regular Docker image
      #   run: |
      #     docker build -t "kartado_backend/${ZAPPA_ENVIRONMENT_NAME}" .
      #     docker tag "kartado_backend/${ZAPPA_ENVIRONMENT_NAME}:latest" "$REGULAR_IMAGE"

      # - name: Push regular Docker image to ECR
      #   run: |
      #     if [ "${{ inputs.dry_run }}" == "true" ]; then
      #       echo "DRY-RUN: Regular Docker image built and tagged"
      #       echo "  Image: $REGULAR_IMAGE"
      #       echo "  Skipping push to ECR"
      #     else
      #       docker push "$REGULAR_IMAGE"
      #       echo "Successfully pushed: $REGULAR_IMAGE"
      #     fi

      # ==========================================================
      # STEP 5: Build ECS Fargate image and register task definition
      # ==========================================================
      - name: Build ECS Fargate Docker image
        run: |
          echo "Building ECS Fargate image (Dockerfile.ecs)"
          echo "  Repository => $ECS_ECR_REPOSITORY"
          echo "  Image Tag  => $ECS_IMAGE_TAG"
          docker build -f Dockerfile.ecs -t "$ECS_ECR_REPOSITORY:$ECS_IMAGE_TAG" .

          docker tag "$ECS_ECR_REPOSITORY:$ECS_IMAGE_TAG" "$ECR_BASE/$ECS_ECR_REPOSITORY:$ECS_IMAGE_TAG"
          docker tag "$ECS_ECR_REPOSITORY:$ECS_IMAGE_TAG" "$ECR_BASE/$ECS_ECR_REPOSITORY:latest"

      - name: Push ECS Fargate image to ECR
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "DRY-RUN: ECS Fargate image built and tagged"
            echo "  Image: $ECS_IMAGE_URI"
            echo "  Skipping push to ECR"
          else
            aws ecr describe-repositories --repository-names "$ECS_ECR_REPOSITORY" --region "${{ vars.AWS_DEFAULT_REGION }}" 2>/dev/null || \
              aws ecr create-repository --repository-name "$ECS_ECR_REPOSITORY" --region "${{ vars.AWS_DEFAULT_REGION }}"

            echo "Pushing ECS Fargate images to ECR..."
            docker push "$ECR_BASE/$ECS_ECR_REPOSITORY:$ECS_IMAGE_TAG"
            docker push "$ECR_BASE/$ECS_ECR_REPOSITORY:latest"
            echo "Successfully pushed: $ECS_IMAGE_URI"
          fi

      - name: Register ECS Task Definition
        env:
          STAGE: ${{ vars.STAGE }}
          BUCKET_S3: ${{ vars.BUCKET_S3 }}
          TASK_FAMILY: ${{ vars.TASK_FAMILY || 'kartado-backend' }}
          DB_HOST: ${{ vars.DB_HOST }}
          DB_NAME: ${{ vars.DB_NAME }}
          DB_USER: ${{ vars.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          REGION: ${{ vars.AWS_DEFAULT_REGION }}
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "DRY-RUN: Simulando registro de task definition"
            echo "  Task Family: $TASK_FAMILY"
            echo "  Image URI: $ECS_IMAGE_URI"
            echo "  Stage: $STAGE"
            echo "  Bucket S3: $BUCKET_S3"
          else
            echo "Processing ecs-task-definition.json..."
            python3 << 'PYEOF'
          import os, json

          with open('ecs-task-definition.json') as f:
              content = f.read()

          replacements = {
              '<ACCOUNT_ID>': os.environ['AWS_ACCOUNT_ID'],
              '<IMAGE_URI>': os.environ['ECS_IMAGE_URI'],
              '"family": "kartado-backend"': '"family": "' + os.environ['TASK_FAMILY'] + '"',
              '<STAGE>': os.environ['STAGE'],
              '<AWS_REGION>': os.environ['REGION'],
              '<BUCKET_S3>': os.environ['BUCKET_S3'],
              '<DB_HOST>': os.environ['DB_HOST'],
              '<DB_NAME>': os.environ['DB_NAME'],
              '<DB_USER>': os.environ['DB_USER'],
              '<DB_PASSWORD>': os.environ['DB_PASSWORD'],
              '<SECRET_KEY>': os.environ['SECRET_KEY'],
          }

          for k, v in replacements.items():
              content = content.replace(k, v)

          with open('task-definition-processed.json', 'w') as f:
              f.write(content)
          PYEOF

            echo "Registering task definition..."
            TASK_DEF_ARN=$(aws ecs register-task-definition \
              --cli-input-json file://task-definition-processed.json \
              --region "${{ vars.AWS_DEFAULT_REGION }}" \
              --query 'taskDefinition.taskDefinitionArn' \
              --output text)
            echo "Task definition registered: $TASK_DEF_ARN"
          fi

      # ==========================================================
      # STEP 6: Deploy Fargate Proxy Lambda (inside CI image)
      # ==========================================================
      - name: Deploy Fargate Proxy Lambda
        run: |
          if [ "${{ inputs.dry_run }}" == "true" ]; then
            echo "DRY-RUN: Simulando deploy Fargate Proxy Lambda"
            echo "  Stage: $ZAPPA_ENVIRONMENT_NAME"
          else
            docker run --rm --entrypoint "" \
              -v "${{ github.workspace }}:/app" -w /app \
              -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
              -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
              -e AWS_DEFAULT_REGION="${{ vars.AWS_DEFAULT_REGION }}" \
              -e ZAPPA_ENV="$ZAPPA_ENVIRONMENT_NAME" \
              $CI_IMAGE bash -c '
                mkdir -p ~/.aws &&
                echo "[default]" > ~/.aws/config &&
                echo "region = $AWS_DEFAULT_REGION" >> ~/.aws/config &&
                echo "[default]" > ~/.aws/credentials &&
                echo "aws_access_key_id = $AWS_ACCESS_KEY_ID" >> ~/.aws/credentials &&
                echo "aws_secret_access_key = $AWS_SECRET_ACCESS_KEY" >> ~/.aws/credentials &&

                cd support_lambda_functions &&
                python3 -m venv .venv &&
                source .venv/bin/activate &&
                pip install -r requirements.txt &&
                zappa update "$ZAPPA_ENV"
              '
          fi
